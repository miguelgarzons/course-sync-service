name: Deploy Django to Cloud Run

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PROJECT_ID: pruebasclassroomsinu
  REGION: us-central1
  PYTHON_VERSION: '3.11'

jobs:
  # Job para verificar compilación y tests
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check for syntax errors
      run: |
        python -m py_compile $(find . -name "*.py" -not -path "./venv/*" -not -path "./.venv/*")

    - name: Run Django checks
      run: |
        python manage.py check --deploy

    - name: Run migrations check
      run: |
        python manage.py makemigrations --check --dry-run

    - name: Run tests
      run: |
        python manage.py test
      continue-on-error: false

    - name: Build Docker image (test)
      run: docker build -t test-image:latest .

  deploy-develop:
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://django-api-dev-xxxxxxxxx-uc.a.run.app
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker
      run: gcloud auth configure-docker

    - name: Build Docker image
      run: docker build -t gcr.io/${{ env.PROJECT_ID }}/django-api-dev:${{ github.sha }} -t gcr.io/${{ env.PROJECT_ID }}/django-api-dev:latest .

    - name: Push to Container Registry
      run: |
        docker push gcr.io/${{ env.PROJECT_ID }}/django-api-dev:${{ github.sha }}
        docker push gcr.io/${{ env.PROJECT_ID }}/django-api-dev:latest

    - name: Deploy to Cloud Run (Development)
      run: |
        gcloud run deploy course-sync-service-dev \
          --image gcr.io/${{ env.PROJECT_ID }}/django-api-dev:${{ github.sha }} \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8000 \
          --env-vars-file .env\
          --max-instances=2 \
          --memory=512Mi


